<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Compiler · AI 漫剧</title>
<style>
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #242836;
  --text: #e1e4e8; --text2: #8b949e; --accent: #58a6ff;
  --accent2: #3fb950; --warn: #d2991d; --err: #f85149;
  --border: #30363d; --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Top Bar ── */
#topbar {
  display: flex; align-items: center; gap: 12px; padding: 8px 14px;
  background: var(--bg2); border-bottom: 1px solid var(--border); min-height: 48px; flex-shrink: 0;
}
#topbar h2 { font-size: 15px; color: var(--accent); white-space: nowrap; }
#topbar select, #topbar input {
  padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 12px;
}
#topbar input { width: 140px; }
#topbar .stat { font-size: 11px; color: var(--text2); margin-left: auto; }
#topbar .stat strong { color: var(--text); margin: 0 4px; }

/* ── Main Split ── */
#mainSplit {
  flex: 1; display: flex; overflow: hidden; min-height: 0;
}

/* ── Left: Chat ── */
#leftPanel {
  flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border);
  min-width: 0; background: var(--bg);
}
#chatMessages {
  flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
.chat-msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.chat-msg.assistant { align-self: flex-start; background: var(--bg2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-msg.system { align-self: center; font-size: 11px; color: var(--text2); background: transparent; max-width: 90%; text-align: center; }
.chat-msg .time { font-size: 10px; opacity: 0.5; margin-top: 4px; }
.chat-msg pre { background: var(--bg); padding: 8px; border-radius: 4px; font-size: 11px; overflow-x: auto; margin-top: 6px; }
.chat-msg .import-btn { margin-top: 8px; }
.chat-input-bar {
  padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg2); flex-shrink: 0;
}
.chat-input-bar textarea {
  flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 13px; resize: none; min-height: 42px;
  max-height: 120px; font-family: inherit;
}
.chat-input-bar textarea:focus { border-color: var(--accent); outline: none; }

/* ── Right: Tools ── */
#rightPanel {
  flex: 1; display: flex; flex-direction: column; background: var(--bg2); min-width: 0;
}
#tabBar {
  display: flex; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0;
}
#tabBar button {
  padding: 10px 14px; background: transparent; border: none; color: var(--text2);
  font-size: 12px; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
#tabBar button:hover { color: var(--text); background: var(--bg3); }
#tabBar button.active { color: var(--accent); border-bottom-color: var(--accent); }
#tabContent {
  flex: 1; overflow-y: auto; padding: 14px; min-height: 0;
}

/* ── Cards ── */
.card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.card h3, .card h4 { font-size: 13px; color: var(--accent); margin-bottom: 6px; }
.card label { font-size: 11px; color: var(--text2); display: block; margin-top: 6px; }
.card input, .card textarea, .card select {
  width: 100%; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 12px; margin-top: 2px;
}
.card textarea { min-height: 50px; resize: vertical; }
.card input:focus, .card textarea:focus, .card select:focus { border-color: var(--accent); outline: none; }
.panel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.panel-card { position: relative; cursor: grab; }
.panel-card:active { cursor: grabbing; }
.panel-card.drag-over { border-color: var(--accent2); border-style: dashed; background: #1a2a1a; }
.panel-card.dragging { opacity: 0.4; }
.panel-card .drag-handle { position: absolute; top: 8px; left: 10px; font-size: 14px; color: var(--text2); cursor: grab; user-select: none; }
.panel-card .panel-num { position: absolute; top: 8px; right: 10px; font-size: 11px; color: var(--accent); font-weight: 700; }

/* ── Result grid ── */
.result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.result-card { background: var(--bg3); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
.result-card img { width: 100%; display: block; }
.result-card.selected { border: 3px solid var(--accent2); }
.result-card .result-label { font-size: 10px; padding: 4px 8px; color: var(--text2); text-align: center; }

/* ── Table ── */
.mapping-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.mapping-table th { background: var(--bg); padding: 6px 8px; text-align: left; border-bottom: 2px solid var(--border); color: var(--accent); white-space: nowrap; }
.mapping-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mapping-table tr:hover td { background: rgba(88,166,255,0.05); }

/* ── Buttons ── */
.btn { padding: 7px 14px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: transparent; color: var(--err); border: 1px solid var(--err); }
.btn-danger:hover { background: #3a1a1a; }
.btn-success { background: var(--accent2); color: #fff; }
.btn-sm { padding: 3px 8px; font-size: 10px; }
.form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; gap: 2px; min-width: 80px; }
.form-group label { font-size: 11px; color: var(--text2); }
.form-group input, .form-group select, .form-group textarea {
  padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 12px;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); outline: none; }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 12px; z-index: 999; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div id="topbar">
  <h2>Agent Compiler</h2>
  <select id="projectSelect" onchange="switchProject()"><option value="">-- 新建/切换项目 --</option></select>
  <input type="text" id="newProjectName" placeholder="项目名称...">
  <button class="btn btn-primary btn-sm" onclick="createProject()">+ 创建</button>
  <span class="stat">分镜:<strong id="statPanels">0</strong></span>
  <span class="stat">角色:<strong id="statChars">0</strong></span>
  <span class="stat">已生成:<strong id="statGenerated">0</strong></span>
  <span class="stat">LLM:<strong id="statLLM">0</strong></span>
  <span id="queueInfo" style="font-size:10px;color:var(--text2);margin-left:8px;">ComfyUI: --</span>
  <span id="projectFolder" style="font-size:10px;color:var(--text2);margin-left:auto;"></span>
</div>

<!-- ── Main Split ── -->
<div id="mainSplit">
  <!-- Left: Chat -->
  <div id="leftPanel">
    <div id="chatMessages">
      <div class="chat-msg system">欢迎使用 Agent Compiler · AI 漫剧<br>在左侧输入故事梗概，Agent 会自动生成完整故事并导入右侧工具面板</div>
    </div>
    <div class="chat-input-bar">
      <textarea id="chatInput" rows="1" placeholder="输入故事梗概或指令... (Enter发送)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button class="btn btn-primary" onclick="sendChat()">发送</button>
    </div>
  </div>

  <!-- Right: Tools -->
  <div id="rightPanel">
    <div id="tabBar">
      <button onclick="switchTab('story')" class="active">📖 故事编辑</button>
      <button onclick="switchTab('characters')">👤 角色</button>
      <button onclick="switchTab('environments')">🌍 环境</button>
      <button onclick="switchTab('panels')">🎬 分镜</button>
      <button onclick="switchTab('table')">📊 表格</button>
      <button onclick="switchTab('style')">🎨 审图</button>
      <button onclick="switchTab('video')">🎥 视频</button>
      <button onclick="switchTab('comfyui')">⚡ ComfyUI</button>
      <button onclick="switchTab('memory')">🧠 记忆</button>
      <button onclick="switchTab('skills')">🔧 技能</button>
    </div>
    <div id="tabContent"><div style="text-align:center;color:var(--text2);padding:40px;">选择项目后开始</div></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// Global State
// ═══════════════════════════════════════════════════════════════════
let currentProjectId = null;
let currentTab = 'story';
let allWorkflows = [];
let _dragIdx = -1;

function esc(s) {
  const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML;
}
function escAttr(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ═══════════════════════════════════════════════════════════════════
// Tabs
// ═══════════════════════════════════════════════════════════════════
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('#tabBar button').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`#tabBar button[onclick="switchTab('${name}')"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('tabContent').innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;">加载中...</div>';
  loadTabContent(name);
}

async function loadTabContent(name) {
  switch(name) {
    case 'story': loadStoryTab(); break;
    case 'characters': await loadCharactersTab(); break;
    case 'environments': await loadEnvironmentsTab(); break;
    case 'panels': await loadPanelsTab(); break;
    case 'table': await loadTableTab(); break;
    case 'style': await loadStyleTab(); break;
    case 'video': await loadVideoTab(); break;
    case 'comfyui': await loadComfyuiTab(); break;
    case 'memory': await loadMemoryTab(); break;
    case 'skills': await loadSkillsTab(); break;
  }
}

// ═══════════════════════════════════════════════════════════════════
// Projects
// ═══════════════════════════════════════════════════════════════════
async function refreshProjects() {
  try {
    const resp = await fetch('/api/projects');
    const data = await resp.json();
    const projects = data.projects || [];
    const sel = document.getElementById('projectSelect');
    sel.innerHTML = '<option value="">-- 新建/切换项目 --</option>' +
      projects.map(p => `<option value="${p.id}" ${p.id===currentProjectId?'selected':''}>${esc(p.name||p.id)}</option>`).join('');
    if (currentProjectId && !projects.find(p => p.id === currentProjectId)) {
      currentProjectId = null;
    }
    if (currentProjectId) updateProjectFolder();
  } catch(e) {}
}

async function updateProjectFolder() {
  if (!currentProjectId) { document.getElementById('projectFolder').textContent = ''; return; }
  document.getElementById('projectFolder').innerHTML = `📁 comic_data/${esc(currentProjectId)}/`;
}

async function createProject() {
  const name = document.getElementById('newProjectName').value.trim() || '未命名项目';
  const resp = await fetch('/api/projects', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name}),
  });
  const data = await resp.json();
  if (data.success) {
    currentProjectId = data.project.id;
    await refreshProjects();
    updateProjectFolder();
    switchTab('story');
    toast('项目已创建: ' + name);
  }
}

async function switchProject() {
  const sel = document.getElementById('projectSelect');
  currentProjectId = sel.value || null;
  updateProjectFolder();
  if (currentProjectId) {
    loadTabContent(currentTab);
    refreshStats();
  }
}

// ═══════════════════════════════════════════════════════════════════
// Chat
// ═══════════════════════════════════════════════════════════════════
async function sendChat() {
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';

  addChatMsg('user', msg);

  // Detect story generation intent
  const isStoryGen = /写|故事|生成.*故事|创作|编|小说|剧本|漫剧/.test(msg);

  if (isStoryGen && currentProjectId) {
    // Auto-trigger comprehensive breakdown
    addChatMsg('system', 'Agent 正在为您创作完整故事...');
    try {
      const resp = await fetch('/api/story/comprehensive-breakdown', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({premise: msg, project_id: currentProjectId, target_characters: 3, target_panels: 8}),
      });
      const data = await resp.json();
      if (data.success) {
        document.querySelectorAll('.chat-msg.system').forEach(el => {
          if (el.textContent.includes('正在为您创作')) el.remove();
        });
        const storyText = `**${data.story_title||'故事'}**\n\n${data.story_summary||''}\n\n> 已自动生成 ${(data.characters||[]).length} 个角色、${(data.environments||[]).length} 个环境、${(data.panels||[]).length} 个分镜，并导入到右侧各面板。`;
        addChatMsg('assistant', storyText);
        refreshStats();
        toast('故事已自动导入到故事编辑、角色、环境、分镜面板');
      } else {
        addChatMsg('assistant', '故事生成失败: ' + (data.error || '未知错误'));
      }
    } catch(e) {
      addChatMsg('assistant', '请求失败: ' + e.message);
    }
  } else {
    // Regular chat
    addChatMsg('system', '思考中...');
    try {
      const resp = await fetch('/api/chat', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg, session_id: currentProjectId || undefined}),
      });
      const data = await resp.json();
      document.querySelectorAll('.chat-msg.system').forEach(el => {
        if (el.textContent.includes('思考中')) el.remove();
      });
      if (data.error) {
        addChatMsg('assistant', '错误: ' + data.error);
      } else {
        let text = data.text || data.reply || '';
        // Detect if response contains a story — offer import
        if (text.length > 200 && /故事|角色|场景|分镜/.test(text)) {
          text += '\n\n<div class="import-btn"><button class="btn btn-primary btn-sm" onclick="importStoryToEditor()">📥 导入故事到编辑器</button></div>';
        }
        addChatMsg('assistant', text);
      }
    } catch(e) {
      addChatMsg('assistant', '请求失败: ' + e.message);
    }
  }
  refreshStats();
}

function addChatMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  const html = esc(text)
    .replace(/\n/g, '<br>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^&gt;\s(.+)$/gm, '<em>$1</em>');
  div.innerHTML = html + '<div class="time">' + new Date().toLocaleTimeString() + '</div>';
  const container = document.getElementById('chatMessages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  // Make import button work
  div.querySelector('.import-btn button')?.addEventListener('click', importStoryToEditor);
}

function importStoryToEditor() {
  if (!currentProjectId) { toast('请先创建项目'); return; }
  switchTab('story');
  toast('请在故事编辑中粘贴故事内容');
}

async function refreshStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('statLLM').textContent = d.llm || 0;
    document.getElementById('statTokens').textContent = (d.tokens||{}).total || 0;
    document.getElementById('queueInfo').textContent = 'ComfyUI: OK';
  } catch(e) {}
  if (currentProjectId) {
    try {
      const [pr, cr] = await Promise.all([
        fetch('/api/projects/' + currentProjectId + '/panels'),
        fetch('/api/projects/' + currentProjectId + '/characters'),
      ]);
      const pd = await pr.json(); const cd = await cr.json();
      document.getElementById('statPanels').textContent = (pd.panels||[]).length;
      document.getElementById('statChars').textContent = (cd.characters||[]).length;
    } catch(e) {}
  }
  updateProjectFolder();
}

// ═══════════════════════════════════════════════════════════════════
// Story Tab
// ═══════════════════════════════════════════════════════════════════
function loadStoryTab() {
  if (!currentProjectId) {
    document.getElementById('tabContent').innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px;">请先创建或选择项目</div>';
    return;
  }
  document.getElementById('tabContent').innerHTML = `
    <div class="card" style="border:1px solid var(--accent);">
      <h3>📖 故事编辑</h3>
      <p style="font-size:11px;color:var(--text2);margin-bottom:8px;">将完整故事内容粘贴到下方，点击拆解按钮自动生成角色/环境/分镜/配音/动作，并分别导入对应标签页。每个分镜会组装英文正/反向提示词用于 ComfyUI 生图。</p>
      <label>故事内容（直接粘贴全文）</label>
      <textarea id="storyContent" rows="12" placeholder="在此粘贴完整的漫画/影视故事内容...&#10;&#10;例如：&#10;在古老的江湖中，一位名叫凌风的少年剑客踏上了寻找失落秘籍的旅程。他在竹林深处遇见了一位神秘的蒙面女子，两人发生了一场激烈的对决..."></textarea>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
        <button class="btn btn-primary" onclick="storyBreakdown()">🔨 拆解生成角色/环境/分镜</button>
        <span style="font-size:11px;color:var(--text2);">目标分镜数: <input id="targetPanels" value="8" style="width:50px;text-align:center;" type="number" min="1" max="30"></span>
        <span style="font-size:11px;color:var(--text2);">目标角色数: <input id="targetChars" value="3" style="width:50px;text-align:center;" type="number" min="1" max="10"></span>
      </div>
    </div>
    <div id="storyPreview"></div>
  `;
  loadStoryPreview();
}

async function loadStoryPreview() {
  if (!currentProjectId) return;
  try {
    const [pr, cr, er] = await Promise.all([
      fetch('/api/projects/' + currentProjectId + '/panels'),
      fetch('/api/projects/' + currentProjectId + '/characters'),
      fetch('/api/projects/' + currentProjectId + '/environments'),
    ]);
    const panels = (await pr.json()).panels || [];
    const chars = (await cr.json()).characters || [];
    const envs = (await er.json()).environments || [];
    document.getElementById('storyPreview').innerHTML = `
      <div class="card">
        <h4>当前项目内容</h4>
        <div style="font-size:12px;color:var(--text2);">
          角色: ${chars.length} | 环境: ${envs.length} | 分镜: ${panels.length}
          ${panels.length ? `<br>分镜概览: ${panels.map(p=>'#'+p.panel_num+' '+esc((p.scene_description||'').substring(0,30))).join(', ')}` : ''}
        </div>
        <div style="font-size:10px;color:var(--text2);margin-top:4px;">📁 项目文件夹: comic_data/${esc(currentProjectId)}/</div>
      </div>
    `;
    document.getElementById('statPanels').textContent = panels.length;
    document.getElementById('statChars').textContent = chars.length;
  } catch(e) {}
}

async function storyBreakdown() {
  if (!currentProjectId) { toast('请先选择项目'); return; }
  const storyText = document.getElementById('storyContent').value.trim();
  if (!storyText) { toast('请先在故事编辑区粘贴故事内容'); return; }
  const targetPanels = parseInt(document.getElementById('targetPanels').value) || 8;
  const targetChars = parseInt(document.getElementById('targetChars').value) || 3;

  document.getElementById('tabContent').querySelector('.btn-primary').disabled = true;
  toast('正在拆解故事...');
  try {
    const resp = await fetch('/api/story/comprehensive-breakdown', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({premise: storyText, project_id: currentProjectId, target_characters: targetChars, target_panels: targetPanels}),
    });
    const data = await resp.json();
    document.getElementById('tabContent').querySelector('.btn-primary').disabled = false;
    if (data.success) {
      toast(`拆解完成！${(data.characters||[]).length} 角色、${(data.environments||[]).length} 环境、${(data.panels||[]).length} 分镜已自动导入`);
      refreshStats();
      loadStoryPreview();
    } else {
      toast('拆解失败: ' + (data.error || ''));
    }
  } catch(e) {
    document.getElementById('tabContent').querySelector('.btn-primary').disabled = false;

async function assembleAndGenAll() {
  if (!currentProjectId) { toast('请先选择项目'); return; }
  const resp = await fetch('/api/projects/' + currentProjectId + '/panels');
  const panels = (await resp.json()).panels || [];
  toast('组装提示词并生成全部 ' + panels.length + ' 个分镜...');
  await fetch('/api/projects/' + currentProjectId + '/assemble-prompts', {method:'POST'});
  document.getElementById('panelGenStatus').textContent = '0/' + panels.length;
  for (let i = 0; i < panels.length; i++) {
    document.getElementById('panelGenStatus').textContent = (i+1) + '/' + panels.length;
    const r = await fetch('/api/projects/' + currentProjectId + '/panels/' + panels[i].id + '/regenerate', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({steps:20, cfg:7, seed:-1}),
    });
    const d = await r.json();
    if (d.success && d.prompt_id) await pollPanelAsync(d.prompt_id);
    if (i < panels.length - 1) await new Promise(r => setTimeout(r, 3000));
  }
  document.getElementById('panelGenStatus').textContent = '完成!';
  if (currentTab === 'panels') loadPanelsTab();
  refreshStats();
}

async function pollPanelAsync(promptId) {
  return new Promise(resolve => {
    const check = async () => {
      try {
        const resp = await fetch('/api/comfyui/status/' + encodeURIComponent(promptId));
        const data = await resp.json();
        if (data.found && (data.status === 'success' || data.status === 'done')) { resolve(); return; }
        if (data.found && data.status === 'error') { resolve(); return; }
      } catch(e) {}
      setTimeout(check, 3000);
    };
    check();
  });
}

function pollPanelResult(panelId, promptId) {
  const check = async () => {
    try {
      const resp = await fetch('/api/comfyui/status/' + encodeURIComponent(promptId));
      const data = await resp.json();
      if (data.found && (data.status === 'success' || data.status === 'done')) {
        if (currentTab === 'panels') loadPanelsTab();
        toast('分镜生成完成!');
        refreshStats();
        return;
      } else if (data.found && data.status === 'error') { toast('生成失败'); return; }
    } catch(e) {}
    setTimeout(check, 3000);
  };
  check();
}

// Panel drag-and-drop
function onDragStart(e, idx) { _dragIdx = idx; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('#panelList .panel-card').forEach(c => c.classList.remove('drag-over')); }
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragEnter(e) { e.preventDefault(); e.target.closest('.panel-card')?.classList.add('drag-over'); }
function onDragLeave(e) { e.target.closest('.panel-card')?.classList.remove('drag-over'); }
async function onDrop(e, targetIdx) {
  e.preventDefault();
  document.querySelectorAll('#panelList .panel-card').forEach(c => c.classList.remove('drag-over'));
  if (_dragIdx < 0 || _dragIdx === targetIdx) return;
  const resp = await fetch('/api/projects/' + currentProjectId + '/panels');
  const data = await resp.json();
  const panels = data.panels;
  const [moved] = panels.splice(_dragIdx, 1);
  panels.splice(targetIdx, 0, moved);
  panels.forEach((p, i) => p.panel_num = i + 1);
  await fetch('/api/projects/' + currentProjectId + '/panels', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({panels}),
  });
  _dragIdx = -1;
  loadPanelsTab();
}

async function saveStyleConfig() {
  if (!currentProjectId) return;
  const wf = document.getElementById('styleWorkflow').value;
  const body = {
    style_name: document.getElementById('stylePreset').value,
    workflow_id: wf,
    positive_prefix: document.getElementById('stylePositive').value,
    negative_prompt: document.getElementById('styleNegative').value,
    character_ref_workflow: document.getElementById('styleCharWf').value || wf,
    environment_ref_workflow: document.getElementById('styleEnvWf').value || wf,
    video_workflow: document.getElementById('styleVideoWf').value,
    fixed_params: {
      seed: parseInt(document.getElementById('styleSeed').value) || -1,
      cfg: parseFloat(document.getElementById('styleCfg').value) || 7,
      steps: parseInt(document.getElementById('styleSteps').value) || 20,
    },
  };
  await fetch('/api/projects/' + currentProjectId + '/style', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  toast('风格配置已保存');
}

async function confirmStyle() {
  if (!currentProjectId) { toast('请先选择项目'); return; }
  await saveStyleConfig();
  const resp = await fetch('/api/projects/' + currentProjectId + '/style/lock', {method:'POST'});
  const data = await resp.json();
  document.getElementById('styleStatus').innerHTML = '✅ 风格已确认 — 全项目统一使用此画风参数';
  toast(data.message || '风格已确认');
}

async function generateStylePreview(count) {
  if (!currentProjectId) { toast('请先选择项目'); return; }
  await saveStyleConfig();
  const wf = document.getElementById('styleWorkflow').value;
  if (!wf) { toast('请先选择生图工作流'); return; }
  document.getElementById('btnGenPreview').disabled = true;
  const statusEl = document.getElementById('previewStatus');
  statusEl.textContent = `提交 ${count} 张预览...`;
  const resp = await fetch('/api/projects/' + currentProjectId + '/style/preview', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({count}),
  });
  const data = await resp.json();
  if (!data.success) { toast('失败: ' + (data.error||'')); document.getElementById('btnGenPreview').disabled = false; return; }
  statusEl.textContent = '等待生成...';
  pollStylePreviews(data.prompt_ids || []);
}

function selectPreview(idx) {
  if (!currentProjectId) return;

async function loadWorkflowParams() {
  if (!currentProjectId) return;
  try {
    const resp = await fetch('/api/projects/' + currentProjectId + '/style/workflow-params');
    const data = await resp.json();
    if (!data.success) return;
    const p = data.params;
    let html = '<div class="card" style="border:1px solid var(--accent2);"><h4>🔍 当前工作流参数（将用于所有生图）</h4><table style="width:100%;font-size:11px;border-collapse:collapse;">';
    const addRow = (label, value) => { html += `<tr><td style="color:var(--text2);padding:2px 8px;">${label}</td><td style="padding:2px 8px;">${esc(String(value||'—'))}</td></tr>`; };
    if (p.checkpoints && p.checkpoints.length) addRow('底模 (Checkpoint)', p.checkpoints.join(', '));
    if (p.loras && p.loras.length) p.loras.forEach((l,i) => addRow(`LoRA #${i+1}`, (l.name||'?') + ' (强度:' + (l.strength||'?') + ')'));
    addRow('采样器 (Sampler)', p.sampler);
    addRow('调度器 (Scheduler)', p.scheduler);
    addRow('步数 (Steps)', p.steps);
    addRow('CFG Scale', p.cfg);
    addRow('分辨率', p.resolution);
    addRow('正向提示词节点', p.positive_prompt);
    addRow('负向提示词节点', p.negative_prompt);
    html += '</table></div>';
    const el = document.getElementById('workflowParams');
    if (el) el.innerHTML = html;
  } catch(e) {}

async function clearPreviews() {
  await fetch('/api/projects/' + currentProjectId + '/style/clear-previews', {method:'POST'});
  loadStyleTab();
  toast('预览图已清理');
}

async function pollStylePreviews(promptIds) {
  if (!promptIds.length) {
    document.getElementById('previewStatus').textContent = '完成!';
    document.getElementById('btnGenPreview').disabled = false;
    loadStyleTab();
    return;
  }
  const done = new Set();
  for (const pid of promptIds) {
    try {
      const resp = await fetch('/api/comfyui/status/' + encodeURIComponent(pid));
      const data = await resp.json();
      if (data.found && (data.status === 'success' || data.status === 'done')) {
        done.add(pid);
        const images = data.image_urls || [];
        if (images.length) {
          await fetch('/api/projects/' + currentProjectId + '/style/preview-image', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt_id: pid, image_url: images[0]}),
          });
        }
      } else if (data.found && data.status === 'error') {
        done.add(pid);
      }
    } catch(e) {}
  }
  const remaining = promptIds.filter(p => !done.has(p));
  document.getElementById('previewStatus').textContent = `已完成 ${promptIds.length - remaining.length}/${promptIds.length}`;
  if (remaining.length) {
    setTimeout(() => pollStylePreviews(remaining), 3000);
  } else {
    document.getElementById('previewStatus').textContent = '全部完成!';
    document.getElementById('btnGenPreview').disabled = false;
    loadStyleTab();
    toast('预览图全部生成！点击满意的图片选中它');
  }
}

function onComfyWfChange() {
  const wfId = document.getElementById('comfyWf').value;
  const wf = allWorkflows.find(w => w.id === wfId);
  if (wf) {
    const apiCfg = wf._api_config || wf.api_config || {};
    const enabled = apiCfg.enabledParams || {};
    document.getElementById('comfyWfInfo').textContent = '可调参数: ' + Object.keys(enabled).filter(k=>enabled[k]).join(', ');
  }
}

async function manualGenerate() {
  const wfId = document.getElementById('comfyWf').value;
  if (!wfId) { toast('请选择工作流'); return; }
  const params = {};
  // Build params from enabled params
  const wf = allWorkflows.find(w => w.id === wfId);
  if (wf) {
    const apiCfg = wf._api_config || wf.api_config || {};
    const enabled = apiCfg.enabledParams || {};
    for (const [k, on] of Object.entries(enabled)) {
      if (!on) continue;
      if (k.endsWith(':text')) params[k] = document.getElementById('comfyPrompt').value || 'test';
      if (k.endsWith(':seed')) params[k] = parseInt(document.getElementById('comfySeed').value) || -1;
      if (k.endsWith(':steps')) params[k] = parseInt(document.getElementById('comfySteps').value) || 20;
      if (k.endsWith(':cfg')) params[k] = parseFloat(document.getElementById('comfyCfg').value) || 7;
    }
  }
  toast('提交生成...');
  const resp = await fetch('/api/comfyui/generate', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({workflow_id: wfId, params, wait: false}),
  });
  const data = await resp.json();
  if (data.success) {
    document.getElementById('comfyResult').innerHTML = `已提交: ${data.prompt_id} <button class="btn btn-sm btn-secondary" onclick="pollComfyResult('${data.prompt_id}')">查看结果</button>`;
  } else {
    document.getElementById('comfyResult').textContent = '失败: ' + (data.error||'');
  }
}

async function pollComfyResult(promptId) {
  const check = async () => {
    const resp = await fetch('/api/comfyui/status/' + encodeURIComponent(promptId));
    const data = await resp.json();
    if (data.found && (data.status === 'success' || data.status === 'done')) {
      const images = data.image_urls || [];
      document.getElementById('comfyResult').innerHTML = '完成! ' + images.map(img => `<img src="${escAttr(img)}" style="max-width:200px;margin:4px;border-radius:4px;">`).join('');
      return;
    } else if (data.found && data.status === 'error') {
      document.getElementById('comfyResult').textContent = '生成失败';
      return;
    }
    setTimeout(check, 3000);
  };
  check();
}

async function loadComfyQueue() {
  try {
    const resp = await fetch('/api/comfyui/queue');
    const data = await resp.json();
    document.getElementById('queueInfo').textContent = `ComfyUI: ${data.busy?'忙碌':'空闲'} | 排队:${data.pending_count||0}`;
  } catch(e) {}
}

  if (!confirm('确定删除此记忆？')) return;
  const resp = await fetch('/api/memory/' + encodeURIComponent(memoryId), {method:'DELETE'});
  const data = await resp.json();
  if (data.success) { toast('已删除'); loadMemoryTab(); }
  else { toast('删除失败: ' + (data.error||'')); }
}

// ═══════════════════════════════════════════════════════════════════
// Skills Tab
// ═══════════════════════════════════════════════════════════════════
async function loadSkillsTab() {
  document.getElementById('tabContent').innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;">加载中...</div>';
  try {
    const resp = await fetch('/api/skills');
    const data = await resp.json();
    const skills = data.skills || [];
    let html = `<div class="card"><h3>🔧 技能管理</h3><p style="font-size:11px;color:var(--text2);">共 ${skills.length} 个技能模板。自动从成功流程生成，下次遇到类似请求自动触发。</p></div>`;
    if (!skills.length) {
      html += '<div style="text-align:center;color:var(--text2);padding:20px;">暂无技能 — 完成一次完整的漫剧流程后会自动生成</div>';
    }
    for (const s of skills) {
      const steps = (s.pipeline_steps || []).map((st,i) => `<li>${esc(st.step||'')}: ${esc(st.description||'')}</li>`).join('');
      html += `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;color:var(--accent);">${esc(s.name||'')}</span>
          <button class="btn btn-danger btn-sm" onclick="deleteSkill('${escAttr(s.id)}')">🗑 删除</button>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;">触发: ${esc((s.description||'').substring(0,200))}</div>
        ${steps ? `<ol style="font-size:11px;color:var(--text2);margin-top:4px;padding-left:20px;">${steps}</ol>` : ''}
        <div style="font-size:10px;color:var(--text2);margin-top:2px;">使用次数: ${s.usage_count||0} | 来源项目: ${esc(s.source_project_id||'')}</div>
      </div>`;
    }
    document.getElementById('tabContent').innerHTML = html;
  } catch(e) {
    document.getElementById('tabContent').innerHTML = '<div style="text-align:center;color:var(--err);padding:20px;">加载失败: ' + e.message + '</div>';
  }
}

async function deleteSkill(skillId) {
  if (!confirm('确定删除此技能？')) return;
  const resp = await fetch('/api/skills/' + encodeURIComponent(skillId), {method:'DELETE'});
  const data = await resp.json();
  if (data.success) { toast('已删除'); loadSkillsTab(); }
  else { toast('删除失败: ' + (data.error||'')); }
}

refreshProjects();
loadComfyQueue();
setInterval(refreshStats, 8000);
setInterval(loadComfyQueue, 5000);
</script>
