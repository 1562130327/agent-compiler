# Agent Compiler 配置文件（可选）
# 如果不使用此文件，所有参数从环境变量读取
# 环境变量: LLM_PROVIDER, LLM_API_KEY, LLM_API_BASE, LLM_MODEL

# ── LLM 配置 ──────────────────────────────────────────
llm:
  # 模式: mock | claude | openai | openai_compat
  provider: mock

  # API 密钥（建议用环境变量 LLM_API_KEY，不要写在这里）
  # api_key: "sk-xxx"

  # 自定义 API 地址（OpenRouter / Ollama / vLLM / 本地模型）
  # api_base: "https://api.openrouter.ai/v1"

  # 模型名
  # model: "anthropic/claude-sonnet-4"

# ── 缓存配置 ──────────────────────────────────────────
cache:
  # 缓存目录
  dir: "./agent_cache"

  # 嵌入相似度阈值（0-1，越低越容易命中缓存）
  similarity_threshold: 0.50

# ── 规则配置 ──────────────────────────────────────────
rules:
  # 规则文件路径
  path: "rules.yaml"

# ── 常见 API 服务配置示例 ─────────────────────────────
#
# OpenAI 官方:
#   provider: openai
#   api_key: sk-xxx
#   model: gpt-4o-mini
#
# OpenRouter (可通过一个 API 调用多个模型):
#   provider: openai_compat
#   api_base: https://openrouter.ai/api/v1
#   api_key: sk-or-v1-xxx
#   model: anthropic/claude-sonnet-4
#
# Ollama 本地:
#   provider: openai_compat
#   api_base: http://localhost:11434/v1
#   model: llama3
#
# DeepSeek:
#   provider: openai_compat
#   api_base: https://api.deepseek.com/v1
#   api_key: sk-xxx
#   model: deepseek-chat
#
# vLLM 自部署:
#   provider: openai_compat
#   api_base: http://your-server:8000/v1
#   model: your-model
